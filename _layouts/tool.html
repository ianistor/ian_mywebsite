---
layout: default
---
<article>
  {% if page.image %}
  <img src="{{ page.image | relative_url }}" alt="{{ page.title }} image" style="max-width:100%; height:auto;" />
  {% endif %}
  <h1>{{ page.title }}</h1>
  <p>{{ page.summary }}</p>
  {{ content }}
  {% if page.links %}
  <ul>
  {% for link in page.links %}
    <li><a href="{{ link.url }}">{{ link.label }}</a></li>
  {% endfor %}
  </ul>
  {% endif %}
</article>
