---
layout: default
---
<article class="content-page post-page">
  <header class="page-header narrow">
    <p class="eyebrow">Blog</p>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags %} · {{ page.tags | join: ', ' }}{% endif %}</p>
  </header>

  <div class="prose narrow">
    {{ content }}
  </div>

  <nav class="post-pagination narrow" aria-label="Post navigation">
    {% if page.previous %}
      <a class="post-pagination-card prev" href="{{ page.previous.url | relative_url }}">
        <span class="post-pagination-label">Previous post</span>
        <strong>{{ page.previous.title }}</strong>
      </a>
    {% endif %}
    {% if page.next %}
      <a class="post-pagination-card next" href="{{ page.next.url | relative_url }}">
        <span class="post-pagination-label">Next post</span>
        <strong>{{ page.next.title }}</strong>
      </a>
    {% endif %}
  </nav>
</article>
