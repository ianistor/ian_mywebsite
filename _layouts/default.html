<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/logos/favicon-ian.svg' | relative_url }}">
  <link rel="alternate icon" href="{{ '/assets/images/logos/favicon-ian.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
</head>
<body>
  <div class="page-shell">
  <header class="site-header">
    <div class="container">
      <div class="floating-header" role="navigation" aria-label="Main navigation">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-full">{{ site.title }}</span>
          <span class="brand-short" aria-hidden="true">IAN • TA</span>
        </a>
        <nav class="site-nav" id="site-nav" aria-label="Main navigation">
          {% for item in site.nav %}
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a>
          {% endfor %}
          <a class="header-contact-button" href="{{ '/#contact' | relative_url }}">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="page-scroll">
    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <p>{{ site.description }}</p>
        <p>Hosted on GitHub Pages with Jekyll</p>
      </div>
    </footer>
  </div>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" type="button" aria-label="Close image viewer">×</button>
    <img class="lightbox-image" src="" alt="">
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const prose = document.querySelector('.prose');
      const navToggle = document.querySelector('.nav-toggle');
      const siteNav = document.getElementById('site-nav');
      const headerSearch = document.querySelector('.header-search');
      const headerSearchInput = document.getElementById('site-search-input');
      const headerSearchResults = document.getElementById('header-search-results');
      const root = document.documentElement;
      const siteHeader = document.querySelector('.site-header');
      const floatingHeader = document.querySelector('.floating-header');
      const pageScroll = document.querySelector('.page-scroll');
      const isHomePage = {{ page.url == '/' | jsonify }};
      const mobileCondenseBreakpoint = window.matchMedia('(max-width: 860px)');

      const syncHeaderZoneHeight = () => {
        if (!siteHeader) return;
        const zoneHeight = siteHeader.offsetHeight + 24;
        root.style.setProperty('--header-zone-height', `${zoneHeight}px`);
      };

      syncHeaderZoneHeight();
      window.addEventListener('resize', syncHeaderZoneHeight);

      const syncMobileBrandState = () => {
        if (!floatingHeader) return;
        const scrollPosition = pageScroll ? pageScroll.scrollTop : window.scrollY;
        const shouldCondense = mobileCondenseBreakpoint.matches && (scrollPosition > 12 || !isHomePage);
        floatingHeader.classList.toggle('is-condensed', shouldCondense);
      };

      syncMobileBrandState();
      const mobileScrollTarget = pageScroll || window;
      mobileScrollTarget.addEventListener('scroll', syncMobileBrandState, { passive: true });
      mobileCondenseBreakpoint.addEventListener('change', syncMobileBrandState);

      const initTouchScrollClickGuard = () => {
        const coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        if (!coarsePointer) return;

        const state = {
          x: 0,
          y: 0,
          moved: false,
          active: false,
          until: 0
        };
        const moveThreshold = 8;
        const guardDurationMs = 350;
        const guardedSelector = 'a[href], button, [role="button"], [role="link"], .js-clickable-card[data-href]';

        document.addEventListener('touchstart', (event) => {
          const touch = event.changedTouches && event.changedTouches[0];
          if (!touch) return;
          state.x = touch.clientX;
          state.y = touch.clientY;
          state.moved = false;
          state.active = true;
        }, { passive: true });

        document.addEventListener('touchmove', (event) => {
          if (!state.active) return;
          const touch = event.changedTouches && event.changedTouches[0];
          if (!touch) return;
          const dx = Math.abs(touch.clientX - state.x);
          const dy = Math.abs(touch.clientY - state.y);
          if (dx > moveThreshold || dy > moveThreshold) {
            state.moved = true;
          }
        }, { passive: true });

        document.addEventListener('touchend', () => {
          if (state.active && state.moved) {
            state.until = Date.now() + guardDurationMs;
          }
          state.active = false;
          state.moved = false;
        }, { passive: true });

        document.addEventListener('click', (event) => {
          if (Date.now() > state.until) return;
          if (!event.target.closest(guardedSelector)) return;
          event.preventDefault();
          event.stopPropagation();
        }, true);
      };

      initTouchScrollClickGuard();

      const searchIndex = [
        {% assign search_docs = site.pages | concat: site.posts | concat: site.projects | concat: site.tools %}
        {% for doc in search_docs %}
          {% if doc.title and doc.url %}
            {
              title: {{ doc.title | jsonify }},
              url: {{ doc.url | relative_url | jsonify }},
              type: {{ doc.collection | default: 'page' | replace: '_', '' | jsonify }},
              summary: {{ doc.excerpt | default: doc.content | strip_html | normalize_whitespace | truncate: 180 | jsonify }}
            }{% unless forloop.last %},{% endunless %}
          {% endif %}
        {% endfor %}
      ];

      root.setAttribute('data-theme', 'houdini');

      const formatDocType = (docType) => {
        if (!docType) return 'Page';
        if (docType === 'posts') return 'Blog';
        if (docType === 'projects') return 'Project';
        if (docType === 'tools') return 'Tool';
        return 'Page';
      };

      const getSearchMatches = (query) => {
        const normalizedQuery = query.trim().toLowerCase();
        if (!normalizedQuery) return [];

        return searchIndex
          .filter((item) => {
            const title = item.title ? item.title.toLowerCase() : '';
            const summary = item.summary ? item.summary.toLowerCase() : '';
            return title.includes(normalizedQuery) || summary.includes(normalizedQuery);
          })
          .sort((a, b) => {
            const aStarts = a.title && a.title.toLowerCase().startsWith(normalizedQuery) ? 1 : 0;
            const bStarts = b.title && b.title.toLowerCase().startsWith(normalizedQuery) ? 1 : 0;
            return bStarts - aStarts;
          })
          .slice(0, 6);
      };

      const clearSearchResults = () => {
        if (!headerSearchResults) return;
        headerSearchResults.innerHTML = '';
        headerSearchResults.hidden = true;
      };

      const renderSearchResults = (matches) => {
        if (!headerSearchResults) return;
        headerSearchResults.innerHTML = '';

        if (!matches.length) {
          const emptyItem = document.createElement('li');
          emptyItem.className = 'header-search-results-empty';
          emptyItem.textContent = 'No matching pages found.';
          headerSearchResults.appendChild(emptyItem);
          headerSearchResults.hidden = false;
          return;
        }

        matches.forEach((match) => {
          const item = document.createElement('li');
          const link = document.createElement('a');
          const title = document.createElement('span');
          const type = document.createElement('small');
          link.href = match.url;
          link.className = 'header-search-result-link';
          title.textContent = match.title;
          type.textContent = formatDocType(match.type);
          link.append(title, type);
          item.appendChild(link);
          headerSearchResults.appendChild(item);
        });

        headerSearchResults.hidden = false;
      };

      if (headerSearch && headerSearchInput && headerSearchResults) {
        headerSearchInput.addEventListener('input', function (event) {
          const query = event.target.value;
          if (!query.trim()) {
            clearSearchResults();
            return;
          }

          renderSearchResults(getSearchMatches(query));
        });

        headerSearchInput.addEventListener('focus', function () {
          const query = headerSearchInput.value;
          if (!query.trim()) return;
          renderSearchResults(getSearchMatches(query));
        });

        headerSearch.addEventListener('submit', function (event) {
          event.preventDefault();
          const query = headerSearchInput.value.trim();
          if (!query) return;

          const matches = getSearchMatches(query);
          if (matches.length) {
            window.location.href = matches[0].url;
            return;
          }

          renderSearchResults([]);
        });

        document.addEventListener('click', function (event) {
          if (!headerSearch.contains(event.target)) {
            clearSearchResults();
          }
        });
      }

      const interactiveSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"]';
      const clickableCards = document.querySelectorAll('.js-clickable-card[data-href]');
      clickableCards.forEach((card) => {
        const href = card.dataset.href;
        if (!href) return;

        card.addEventListener('click', function (event) {
          const interactiveTarget = event.target.closest(interactiveSelector);
          if (interactiveTarget && interactiveTarget !== card) return;
          window.location.href = href;
        });

        card.addEventListener('keydown', function (event) {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          const interactiveTarget = event.target.closest(interactiveSelector);
          if (interactiveTarget && interactiveTarget !== card) return;
          event.preventDefault();
          window.location.href = href;
        });
      });

      const initProjectsAutoScroll = () => {
        const projectsRow = document.querySelector('.projects-row:not(.blog-row)');
        const projectsRowWrap = projectsRow ? projectsRow.closest('.projects-row-wrap') : null;
        if (!projectsRow || !projectsRow.querySelector('.project-row-card')) return;
        let isPaused = false;
        const stepPx = 0.6;
        const intervalMs = 28;
        const restartDelayMs = 900;
        let hasClonedCards = false;
        let intervalId = null;
        let restartTimeoutId = null;

        const tick = () => {
          if (isPaused) return;
          const maxScrollLeft = projectsRow.scrollWidth - projectsRow.clientWidth;
          if (maxScrollLeft <= 0) {
            if (!hasClonedCards) {
              const cards = Array.from(projectsRow.querySelectorAll('.project-row-card'));
              cards.forEach((card) => {
                const clone = card.cloneNode(true);
                clone.setAttribute('aria-hidden', 'true');
                clone.tabIndex = -1;
                projectsRow.appendChild(clone);
              });
              hasClonedCards = true;
            }
            return;
          }

          if (projectsRow.scrollLeft >= maxScrollLeft - 1) {
            if (!restartTimeoutId) {
              restartTimeoutId = window.setTimeout(() => {
                projectsRow.scrollLeft = 0;
                restartTimeoutId = null;
              }, restartDelayMs);
            }
            return;
          }
          projectsRow.scrollLeft = Math.min(maxScrollLeft, projectsRow.scrollLeft + stepPx);
          if (projectsRowWrap) {
            projectsRowWrap.classList.toggle('is-scrolled', projectsRow.scrollLeft > 0);
          }
        };

        const resume = () => {
          isPaused = false;
        };

        projectsRow.addEventListener('mouseenter', () => { isPaused = true; });
        projectsRow.addEventListener('mouseleave', resume);
        projectsRow.addEventListener('focusin', () => { isPaused = true; });
        projectsRow.addEventListener('focusout', () => {
          if (!projectsRow.contains(document.activeElement)) resume();
        });
        projectsRow.addEventListener('touchstart', () => { isPaused = true; }, { passive: true });
        projectsRow.addEventListener('touchend', resume, { passive: true });
        projectsRow.addEventListener('scroll', () => {
          if (!projectsRowWrap) return;
          projectsRowWrap.classList.toggle('is-scrolled', projectsRow.scrollLeft > 0);
        }, { passive: true });

        if (projectsRowWrap) {
          projectsRowWrap.classList.toggle('is-scrolled', projectsRow.scrollLeft > 0);
        }

        intervalId = window.setInterval(tick, intervalMs);
        window.addEventListener('beforeunload', () => {
          if (intervalId) window.clearInterval(intervalId);
          if (restartTimeoutId) window.clearTimeout(restartTimeoutId);
        });
      };

      initProjectsAutoScroll();

      const autoLinkTextNodes = (root) => {
        if (!root) return;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            if (!node.nodeValue || !node.nodeValue.includes('http')) {
              return NodeFilter.FILTER_REJECT;
            }
            const parent = node.parentElement;
            if (!parent) return NodeFilter.FILTER_REJECT;
            if (parent.closest('a, code, pre, script, style')) {
              return NodeFilter.FILTER_REJECT;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        const textNodes = [];
        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        const urlRegex = /(https?:\/\/[^\s<]+)/g;
        textNodes.forEach((textNode) => {
          const originalText = textNode.nodeValue;
          if (!urlRegex.test(originalText)) return;
          urlRegex.lastIndex = 0;

          const fragment = document.createDocumentFragment();
          let lastIndex = 0;
          let match;

          while ((match = urlRegex.exec(originalText)) !== null) {
            let urlText = match[0];
            const trailing = urlText.match(/[),.;!?]+$/);
            let trailingText = '';
            if (trailing) {
              trailingText = trailing[0];
              urlText = urlText.slice(0, -trailingText.length);
            }

            if (match.index > lastIndex) {
              fragment.appendChild(document.createTextNode(originalText.slice(lastIndex, match.index)));
            }

            const link = document.createElement('a');
            link.href = urlText;
            link.textContent = urlText;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            fragment.appendChild(link);

            if (trailingText) {
              fragment.appendChild(document.createTextNode(trailingText));
            }

            lastIndex = match.index + match[0].length;
          }

          if (lastIndex < originalText.length) {
            fragment.appendChild(document.createTextNode(originalText.slice(lastIndex)));
          }

          textNode.parentNode.replaceChild(fragment, textNode);
        });
      };

      const getYoutubeEmbedUrl = (inputUrl) => {
        try {
          const url = new URL(inputUrl);
          const host = url.hostname.replace(/^www\./, '');
          let videoId = '';

          if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com') {
            if (url.pathname === '/watch') {
              videoId = url.searchParams.get('v') || '';
            } else if (url.pathname.startsWith('/shorts/')) {
              videoId = url.pathname.split('/')[2] || '';
            } else if (url.pathname.startsWith('/embed/')) {
              videoId = url.pathname.split('/')[2] || '';
            }
          } else if (host === 'youtu.be') {
            videoId = url.pathname.split('/')[1] || '';
          }

          if (!videoId) return null;
          return `https://www.youtube.com/embed/${videoId}`;
        } catch (error) {
          return null;
        }
      };

      const ensureResponsiveEmbedFrame = (iframe) => {
        if (!iframe || iframe.closest('.embed-frame')) return;

        const width = Number(iframe.getAttribute('width'));
        const height = Number(iframe.getAttribute('height'));
        const hasValidRatio = Number.isFinite(width) && Number.isFinite(height) && width > 0 && height > 0;
        if (!hasValidRatio) return;

        const frame = document.createElement('div');
        frame.className = 'embed-frame';
        frame.style.setProperty('--embed-aspect-ratio', `${width} / ${height}`);

        iframe.parentNode.insertBefore(frame, iframe);
        frame.appendChild(iframe);
      };


      const convertYoutubeLinksToEmbeds = (root) => {
        if (!root) return;

        root.querySelectorAll('p').forEach((paragraph) => {
          const trimmedText = paragraph.textContent.trim();
          if (!trimmedText) return;

          const links = Array.from(paragraph.querySelectorAll('a[href]'));
          if (links.length !== 1) return;

          const onlyLink = links[0];
          if (trimmedText !== onlyLink.textContent.trim()) return;

          const embedUrl = getYoutubeEmbedUrl(onlyLink.href);
          if (!embedUrl) return;

          const iframe = document.createElement('iframe');
          iframe.src = embedUrl;
          iframe.title = `YouTube video: ${onlyLink.textContent.trim()}`;
          iframe.width = '16';
          iframe.height = '9';
          iframe.loading = 'lazy';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
          iframe.referrerPolicy = 'strict-origin-when-cross-origin';
          iframe.allowFullscreen = true;

          paragraph.replaceWith(iframe);
          ensureResponsiveEmbedFrame(iframe);
        });
      };

      if (navToggle && siteNav) {
        navToggle.addEventListener('click', function () {
          const isOpen = siteNav.classList.toggle('is-open');
          navToggle.classList.toggle('is-open', isOpen);
          navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          navToggle.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
        });

        siteNav.querySelectorAll('a').forEach((link) => {
          link.addEventListener('click', function () {
            if (window.innerWidth <= 860) {
              siteNav.classList.remove('is-open');
              navToggle.classList.remove('is-open');
              navToggle.setAttribute('aria-expanded', 'false');
              navToggle.setAttribute('aria-label', 'Open navigation');
            }
          });
        });

        document.addEventListener('click', function (event) {
          if (
            window.innerWidth <= 860 &&
            siteNav.classList.contains('is-open') &&
            !siteNav.contains(event.target) &&
            !navToggle.contains(event.target)
          ) {
            siteNav.classList.remove('is-open');
            navToggle.classList.remove('is-open');
            navToggle.setAttribute('aria-expanded', 'false');
            navToggle.setAttribute('aria-label', 'Open navigation');
          }
        });

        window.addEventListener('resize', function () {
          if (window.innerWidth > 860) {
            siteNav.classList.remove('is-open');
            navToggle.classList.remove('is-open');
            navToggle.setAttribute('aria-expanded', 'false');
            navToggle.setAttribute('aria-label', 'Open navigation');
          }
        });
      }

      document.querySelectorAll('pre > code').forEach((codeBlock) => {
        const pre = codeBlock.parentElement;
        const wrapper = document.createElement('div');
        wrapper.className = 'code-block';

        const button = document.createElement('button');
        button.className = 'copy-button';
        button.type = 'button';
        button.textContent = 'Copy';

        const classNames = Array.from(codeBlock.classList);
        const languageClass = classNames.find((name) => name.startsWith('language-'));
        const detectedLanguage = languageClass ? languageClass.replace('language-', '') : '';
        const highlightLanguageMap = {
          py: 'python',
          vex: 'c'
        };
        const displayLanguageMap = {
          py: 'python',
          python: 'python',
          vex: 'vex',
          c: 'vex'
        };
        const normalizedLanguage = displayLanguageMap[detectedLanguage.toLowerCase()] || detectedLanguage.toLowerCase();
        const highlightLanguage = highlightLanguageMap[detectedLanguage.toLowerCase()] || detectedLanguage.toLowerCase();

        if (languageClass && highlightLanguage && highlightLanguage !== detectedLanguage.toLowerCase()) {
          codeBlock.classList.remove(languageClass);
          codeBlock.classList.add(`language-${highlightLanguage}`);
        }

        if (normalizedLanguage === 'python' || normalizedLanguage === 'vex') {
          const badge = document.createElement('span');
          badge.className = 'code-language-badge';
          badge.textContent = normalizedLanguage.toUpperCase();
          wrapper.appendChild(badge);
        }

        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(button);
        wrapper.appendChild(pre);

        if (window.hljs) {
          window.hljs.highlightElement(codeBlock);
        }

        button.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(codeBlock.innerText);
            button.textContent = 'Copied';
            setTimeout(() => button.textContent = 'Copy', 1600);
          } catch (err) {
            button.textContent = 'Failed';
            setTimeout(() => button.textContent = 'Copy', 1600);
          }
        });
      });

      if (prose) {
        autoLinkTextNodes(prose);
        convertYoutubeLinksToEmbeds(prose);
        initializeVideoPosters(prose);
        prose.querySelectorAll('iframe').forEach(ensureResponsiveEmbedFrame);

        prose.querySelectorAll('h2, h3, h4').forEach((heading) => {
          if (!heading.id) {
            heading.id = heading.textContent
              .toLowerCase()
              .trim()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-');
          }

          const anchor = document.createElement('a');
          anchor.className = 'heading-anchor';
          anchor.href = `#${heading.id}`;
          anchor.setAttribute('aria-label', `Link to section ${heading.textContent}`);
          anchor.textContent = '#';
          heading.appendChild(anchor);
        });
      }


      const heroCanvas = document.getElementById('hero-geometry-canvas');
      const heroAnimationSelect = document.getElementById('hero-animation-select');
      const heroAnimationStorageKey = 'hero-animation-mode';

      const initHeroGeometryAnimation = () => {
        if (!heroCanvas) return;

        const context = heroCanvas.getContext('2d');
        if (!context) return;

        const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const modes = ['orbit', 'triangles', 'off'];
        let mode = localStorage.getItem(heroAnimationStorageKey);
        if (!modes.includes(mode)) mode = reducedMotion ? 'off' : 'orbit';

        if (heroAnimationSelect) {
          heroAnimationSelect.value = mode;
          heroAnimationSelect.addEventListener('change', (event) => {
            mode = event.target.value;
            localStorage.setItem(heroAnimationStorageKey, mode);
          });
        }

        const state = {
          orbits: [],
          triangles: [],
          width: 1,
          height: 1,
          rafId: null,
          lastTime: 0
        };

        const getAccentRgb = () => {
          const styles = getComputedStyle(document.documentElement);
          const accent = styles.getPropertyValue('--accent').trim() || '#8cc2ff';
          const normalized = accent.startsWith('#') ? accent.slice(1) : '8cc2ff';
          const fullHex = normalized.length === 3
            ? normalized.split('').map((char) => `${char}${char}`).join('')
            : normalized.padEnd(6, 'f').slice(0, 6);

          const r = parseInt(fullHex.slice(0, 2), 16) || 140;
          const g = parseInt(fullHex.slice(2, 4), 16) || 194;
          const b = parseInt(fullHex.slice(4, 6), 16) || 255;

          return `${r}, ${g}, ${b}`;
        };

        let accentRgb = getAccentRgb();

        const resetOrbits = () => {
          const centerX = state.width * 0.5;
          const centerY = state.height * 0.5;
          const ringCount = Math.max(4, Math.min(10, Math.floor(state.width / 140)));
          state.orbits = Array.from({ length: ringCount }, (_, index) => ({
            radius: 42 + index * 24,
            speed: (index % 2 === 0 ? 1 : -1) * (0.0007 + index * 0.00016),
            size: 2 + (index % 3),
            angle: Math.random() * Math.PI * 2,
            centerX,
            centerY
          }));
        };

        const resetTriangles = () => {
          const step = Math.max(70, Math.floor(state.width / 11));
          state.triangles = [];

          for (let y = -step; y <= state.height + step; y += step) {
            for (let x = -step; x <= state.width + step; x += step) {
              state.triangles.push({
                x,
                y,
                offset: Math.random() * Math.PI * 2,
                phase: Math.random() * Math.PI * 2
              });
            }
          }
        };

        const resetAll = () => {
          accentRgb = getAccentRgb();
          resetOrbits();
          resetTriangles();
        };

        const resize = () => {
          const ratio = Math.min(window.devicePixelRatio || 1, 2);
          const { width, height } = heroCanvas.getBoundingClientRect();
          state.width = Math.max(1, Math.floor(width));
          state.height = Math.max(1, Math.floor(height));
          heroCanvas.width = Math.floor(state.width * ratio);
          heroCanvas.height = Math.floor(state.height * ratio);
          context.setTransform(ratio, 0, 0, ratio, 0, 0);
          resetAll();
        };

        const drawOrbit = (elapsed) => {
          context.lineWidth = 1;
          state.orbits.forEach((ring, index) => {
            const radiusWobble = Math.sin(elapsed * 0.0014 + index) * 4;
            const radius = ring.radius + radiusWobble;
            context.beginPath();
            context.arc(ring.centerX, ring.centerY, radius, 0, Math.PI * 2);
            context.strokeStyle = `rgba(${accentRgb}, 0.16)`;
            context.stroke();

            ring.angle += ring.speed;
            const dotX = ring.centerX + Math.cos(ring.angle) * radius;
            const dotY = ring.centerY + Math.sin(ring.angle) * radius;
            context.beginPath();
            context.arc(dotX, dotY, ring.size, 0, Math.PI * 2);
            context.fillStyle = `rgba(${accentRgb}, 0.88)`;
            context.fill();
          });
        };

        const drawTriangles = (elapsed) => {
          const side = Math.max(50, Math.floor(state.width / 14));
          state.triangles.forEach((point, index) => {
            const pulse = Math.sin(elapsed * 0.0012 + point.phase) * 12;
            const x = point.x + Math.cos(elapsed * 0.0005 + point.offset) * 10;
            const y = point.y + Math.sin(elapsed * 0.0006 + point.offset) * 10;
            const up = index % 2 === 0;
            const p1 = { x, y: y + pulse * 0.2 };
            const p2 = { x: x + side * 0.5, y: y + (up ? -side * 0.68 : side * 0.68) + pulse * 0.2 };
            const p3 = { x: x + side, y: y + pulse * 0.2 };

            context.beginPath();
            context.moveTo(p1.x, p1.y);
            context.lineTo(p2.x, p2.y);
            context.lineTo(p3.x, p3.y);
            context.closePath();
            context.strokeStyle = `rgba(${accentRgb}, 0.14)`;
            context.lineWidth = 1;
            context.stroke();
          });
        };

        const render = (now) => {
          state.rafId = window.requestAnimationFrame(render);
          const elapsed = now || performance.now();
          const delta = elapsed - state.lastTime;

          if (delta < 14) return;
          state.lastTime = elapsed;

          context.clearRect(0, 0, state.width, state.height);
          context.fillStyle = 'rgba(0, 0, 0, 0.14)';
          context.fillRect(0, 0, state.width, state.height);

          if (mode === 'off') return;
          if (mode === 'orbit') drawOrbit(elapsed);
          if (mode === 'triangles') drawTriangles(elapsed);
        };

        let resizeTimer;
        window.addEventListener('resize', () => {
          window.clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(resize, 120);
        });

        const observer = new MutationObserver(() => {
          accentRgb = getAccentRgb();
        });

        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        resize();
        render();
      };

      initHeroGeometryAnimation();


      const initImageCompare = () => {
        const compareBlocks = document.querySelectorAll('[data-image-compare]');
        compareBlocks.forEach((block) => {
          const slider = block.querySelector('[data-image-compare-slider]');
          if (!slider) return;

          const updatePosition = () => {
            const rawValue = Number(slider.value);
            const safeValue = Number.isFinite(rawValue) ? Math.min(100, Math.max(0, rawValue)) : 50;
            block.style.setProperty('--compare-position', `${safeValue}%`);
          };

          slider.addEventListener('input', updatePosition);
          slider.addEventListener('change', updatePosition);
          updatePosition();
        });
      };

      initImageCompare();

      const lightbox = document.getElementById('lightbox');
      const lightboxImage = lightbox ? lightbox.querySelector('.lightbox-image') : null;
      const lightboxClose = lightbox ? lightbox.querySelector('.lightbox-close') : null;

      if (prose && lightbox && lightboxImage) {
        prose.querySelectorAll('img').forEach((img) => {
          img.classList.add('zoomable-image');
          img.addEventListener('click', () => {
            lightboxImage.src = img.currentSrc || img.src;
            lightboxImage.alt = img.alt || '';
            lightbox.hidden = false;
            document.body.classList.add('lightbox-open');
          });
        });
      }

      const closeLightbox = () => {
        if (!lightbox) return;
        lightbox.hidden = true;
        if (lightboxImage) {
          lightboxImage.src = '';
          lightboxImage.alt = '';
        }
        document.body.classList.remove('lightbox-open');
      };

      if (lightbox) {
        lightbox.addEventListener('click', (event) => {
          if (event.target === lightbox) closeLightbox();
        });
      }
      if (lightboxClose) {
        lightboxClose.addEventListener('click', closeLightbox);
      }
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeLightbox();
      });
    });
  </script>
  </div>
</body>
</html>
