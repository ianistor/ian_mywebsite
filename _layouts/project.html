---
layout: default
---
<article class="content-page project-page">
  <header class="page-header narrow">
    <p class="eyebrow">Project</p>
    <h1>{{ page.title }}</h1>
    {% if page.role %}<p class="meta">{{ page.role }}</p>{% endif %}
    {% if page.summary %}<p class="lead">{{ page.summary }}</p>{% endif %}
    {% if page.links %}
      <div class="link-row">
        {% for link in page.links %}
          <a class="button secondary" href="{{ link.url }}">{{ link.label }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="prose narrow">
    {{ content }}
  </div>
</article>
