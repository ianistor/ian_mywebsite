---
layout: default
---
<article class="content-page project-page">
  <header class="page-header narrow">
    <p class="eyebrow">Project</p>
    <h1>{{ page.title }}</h1>

    {% if page.role or page.company %}
      <p class="meta">
        {% if page.role %}{{ page.role }}{% endif %}
        {% if page.company %}
          <br>
          <span class="meta-company">@ {{ page.company }}</span>
        {% endif %}
      </p>
    {% endif %}

    {% if page.summary %}
      <p class="lead">{{ page.summary }}</p>
    {% endif %}
