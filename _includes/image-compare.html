<figure class="image-compare" data-image-compare>
  <img
    class="image-compare-base"
    src="{{ include.before | relative_url }}"
    alt="{{ include.before_alt | default: 'Before image' }}"
    loading="lazy"
  >
  <div class="image-compare-overlay" data-image-compare-overlay>
    <img
      src="{{ include.after | relative_url }}"
      alt="{{ include.after_alt | default: 'After image' }}"
      loading="lazy"
    >
  </div>
  <input
    class="image-compare-slider"
    data-image-compare-slider
    type="range"
    min="0"
    max="100"
    value="{{ include.position | default: 50 }}"
    aria-label="{{ include.label | default: 'Drag to compare images' }}"
  >
</figure>
